<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figure Drawing Mannequin / Croquis Studio</title>
    <!-- Vi använder Cloudflare som är extremt stabilt över hela världen -->
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
        #ui { 
            position: absolute; top: 10px; left: 10px; 
            background: rgba(0,0,0,0.9); padding: 15px; 
            border-radius: 8px; width: 180px; max-height: 90vh; 
            overflow-y: auto; z-index: 100; border: 1px solid #444;
        }
        h2 { color: #ffcc00; font-size: 14px; margin: 0 0 10px 0; text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .label { font-size: 10px; color: #aaa; margin: 10px 0 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        button { 
            width: 100%; padding: 8px; margin-bottom: 4px; 
            background: #222; color: #ddd; border: 1px solid #444; 
            border-radius: 4px; cursor: pointer; font-size: 11px;
        }
        button:hover { background: #ffcc00; color: #000; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #ffcc00; }
        #status-msg { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ffcc00; text-align: center; font-size: 16px; z-index: 1;
        }
    </style>
</head>
<body>

<div id="status-msg">Connecting to Studio...<br><small>If this stays, check your internet connection.</small></div>

<div id="ui">
    <h2>FIGURE DRAWING</h2>
    <div class="label">Light Angle</div>
    <input type="range" id="lightPos" min="-12" max="12" step="0.1" value="5">
    <div class="label">Poses</div>
    <div id="poseButtons"></div>
</div>

<!-- Vi inkluderar en minimal OrbitControls direkt för att slippa externa laddningsfel -->
<script>
    /* Minimal OrbitControls implementation */
    function setupControls(camera, renderer) {
        const controls = { target: new THREE.Vector3(0, 1, 0), update: () => {} };
        let isDragging = false; let previousMousePosition = { x: 0, y: 0 };
        const canvas = renderer.domElement;
        canvas.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaMove = { x: e.offsetX - previousMousePosition.x, y: e.offsetY - previousMousePosition.y };
                const rotateQuaternion = new THREE.Quaternion().setFromEuler(new THREE.Euler(deltaMove.y * 0.01, deltaMove.x * 0.01, 0, 'XYZ'));
                camera.position.applyQuaternion(rotateQuaternion);
                camera.lookAt(controls.target);
            }
            previousMousePosition = { x: e.offsetX, y: e.offsetY };
        });
        canvas.addEventListener('wheel', (e) => {
            const zoomSpeed = 0.1;
            const direction = camera.position.clone().sub(controls.target).normalize();
            if (e.deltaY > 0) camera.position.add(direction.multiplyScalar(zoomSpeed));
            else camera.position.sub(direction.multiplyScalar(zoomSpeed));
            camera.lookAt(controls.target);
        });
        return controls;
    }

    let scene, camera, renderer, spotLight, joints = {};

    function checkLib() {
        if (typeof THREE !== 'undefined') {
            document.getElementById('status-msg').style.display = 'none';
            init();
        } else { setTimeout(checkLib, 200); }
    }

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2.5, 7);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        setupControls(camera, renderer);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        spotLight = new THREE.SpotLight(0xffffff, 1.2);
        spotLight.position.set(5, 10, 5);
        spotLight.castShadow = true;
        scene.add(spotLight);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
        scene.add(floor);

        buildMannequin();
        createButtons();
        animate();
    }

    function buildMannequin() {
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.4 });
        const jointMat = new THREE.MeshStandardMaterial({ color: 0x8800ff });

        function part(geom, mat, y, parent) {
            const m = new THREE.Mesh(geom, mat); m.position.y = y;
            m.castShadow = true; m.receiveShadow = true;
            const p = new THREE.Group(); p.add(m);
            if (parent) parent.add(p); else scene.add(p);
            return p;
        }

        const pelvis = part(new THREE.CylinderGeometry(0.25, 0.15, 0.4, 10), bodyMat, 0);
        pelvis.position.y = 1.2;
        const spine = part(new THREE.SphereGeometry(0.1, 12, 12), jointMat, 0, pelvis);
        const chest = part(new THREE.CylinderGeometry(0.42, 0.25, 0.65, 10), bodyMat, 0.4, spine);
        const neck = part(new THREE.SphereGeometry(0.08, 10, 10), jointMat, 0.4, chest);
        const head = part(new THREE.SphereGeometry(0.2, 20, 20), bodyMat, 0.25, neck);
        head.children[0].scale.set(1, 1.3, 1);

        function limb(parent, x, y, isArm) {
            const j1 = part(new THREE.SphereGeometry(isArm ? 0.1 : 0.13, 12, 12), jointMat, 0, parent);
            j1.position.set(x, y, 0);
            const u = part(new THREE.CylinderGeometry(isArm ? 0.07 : 0.1, isArm ? 0.1 : 0.14, isArm ? 0.45 : 0.6, 8), bodyMat, isArm ? -0.25 : -0.3, j1);
            const j2 = part(new THREE.SphereGeometry(isArm ? 0.08 : 0.11, 12, 12), jointMat, isArm ? -0.3 : -0.35, u);
            const l = part(new THREE.CylinderGeometry(isArm ? 0.05 : 0.08, isArm ? 0.08 : 0.11, isArm ? 0.4 : 0.55, 8), bodyMat, isArm ? -0.25 : -0.3, j2);
            return { j1, j2 };
        }

        const aL = limb(chest, -0.5, 0.35, true); const aR = limb(chest, 0.5, 0.35, true);
        const lL = limb(pelvis, -0.22, -0.1, false); const lR = limb(pelvis, 0.22, -0.1, false);

        joints = { pelvis, spine, lS: aL.j1, rS: aR.j1, lE: aL.j2, rE: aR.j2, lH: lL.j1, rH: lR.j1, lK: lL.j2, rK: lR.j2 };
    }

    function createButtons() {
        const c = document.getElementById('poseButtons');
        for(let i=1; i<=40; i++) {
            const b = document.createElement('button'); b.innerText = 'Pose ' + i;
            b.onclick = () => {
                Object.values(joints).forEach(j => j.rotation.set(0,0,0));
                joints.pelvis.position.y = 1.2;
                const s = Math.sin(i * 1.1);
                joints.pelvis.rotation.z = s * 0.3;
                joints.spine.rotation.x = Math.cos(i) * 0.2;
                joints.lH.rotation.x = s * 0.8; joints.rH.rotation.x = -s * 0.4;
                joints.lK.rotation.x = Math.abs(s) * 1.2;
                joints.lS.rotation.z = -1.2;
                if(i % 5 === 0) { joints.pelvis.position.y = 0.7; joints.lH.rotation.x = -1.5; joints.rH.rotation.x = -1.5; joints.lK.rotation.x = 1.4; joints.rK.rotation.x = 1.4; }
            };
            c.appendChild(b);
        }
    }

    document.getElementById('lightPos').oninput = (e) => spotLight.position.x = parseFloat(e.target.value);
    function animate() { requestAnimationFrame(animate); if(renderer && scene && camera) renderer.render(scene, camera); }
    window.addEventListener('resize', () => { if(camera && renderer) { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }});
    checkLib();
</script>
</body>
</html>
