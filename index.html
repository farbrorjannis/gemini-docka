<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figure Drawing Mannequin / Croquis Studio</title>
    <!-- Vi använder JSDelivr som ofta fungerar bättre i inbäddade miljöer -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
        #ui { 
            position: absolute; top: 10px; left: 10px; 
            background: rgba(0,0,0,0.85); padding: 15px; 
            border-radius: 8px; width: 180px; max-height: 90vh; 
            overflow-y: auto; z-index: 100; border: 1px solid #444;
        }
        h2 { color: #ffcc00; font-size: 14px; margin: 0 0 10px 0; text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .label { font-size: 10px; color: #aaa; margin: 10px 0 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        button { 
            width: 100%; padding: 6px; margin-bottom: 3px; 
            background: #222; color: #ddd; border: 1px solid #444; 
            border-radius: 4px; cursor: pointer; font-size: 11px;
        }
        button:hover { background: #ffcc00; color: #000; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #ffcc00; }
        #status-msg { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ffcc00; text-align: center; font-size: 14px; z-index: 1;
        }
    </style>
</head>
<body>

<div id="status-msg">Loading Studio...</div>

<div id="ui">
    <h2>FIGURE DRAWING</h2>
    <div class="label">Light Angle</div>
    <input type="range" id="lightPos" min="-10" max="10" step="0.1" value="5">
    <div class="label">Poses</div>
    <div id="poseButtons"></div>
</div>

<script>
    let scene, camera, renderer, controls, spotLight;
    let joints = {};

    // Kontrollera att Three.js är laddat innan vi kör
    function checkLibraries() {
        if (typeof THREE !== 'undefined' && THREE.OrbitControls) {
            document.getElementById('status-msg').style.display = 'none';
            init();
        } else {
            // Försök igen om 100ms
            setTimeout(checkLibraries, 100);
        }
    }

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x151515);

        const width = window.innerWidth;
        const height = window.innerHeight;

        camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
        camera.position.set(0, 2.5, 6);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(width, height);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1, 0);

        // LJUS
        const ambient = new THREE.AmbientLight(0xffffff, 0.5); 
        scene.add(ambient);

        spotLight = new THREE.SpotLight(0xffffff, 1.0);
        spotLight.position.set(5, 8, 5);
        spotLight.castShadow = true;
        scene.add(spotLight);

        // GOLV
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x1a1a1a })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        buildMannequin();
        createPoseButtons();
        animate();
    }

    function buildMannequin() {
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.5 });
        const jointMat = new THREE.MeshStandardMaterial({ color: 0x8800ff });

        function createPart(geom, mat, y, parent) {
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.y = y;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            const pivot = new THREE.Group();
            pivot.add(mesh);
            if (parent) parent.add(pivot);
            else scene.add(pivot);
            return { pivot, mesh };
        }

        // Chest (V-shape) & Pelvis
        const pelvis = createPart(new THREE.CylinderGeometry(0.25, 0.15, 0.4, 8), bodyMat, 0, null);
        pelvis.pivot.position.y = 1.1;

        const spine = createPart(new THREE.SphereGeometry(0.1, 12, 12), jointMat, 0, pelvis.pivot);
        const chest = createPart(new THREE.CylinderGeometry(0.4, 0.25, 0.6, 8), bodyMat, 0.35, spine.pivot);

        const neck = createPart(new THREE.SphereGeometry(0.07, 12, 12), jointMat, 0.35, chest.pivot);
        const head = createPart(new THREE.SphereGeometry(0.18, 16, 16), bodyMat, 0.2, neck.pivot);
        head.mesh.scale.set(1, 1.2, 1);

        // Arms & Legs
        function makeLimb(parent, x, y, isArm) {
            const joint = createPart(new THREE.SphereGeometry(isArm ? 0.09 : 0.12, 12, 12), jointMat, 0, parent);
            joint.pivot.position.set(x, y, 0);
            const upper = createPart(new THREE.CylinderGeometry(isArm ? 0.07 : 0.09, isArm ? 0.1 : 0.13, isArm ? 0.4 : 0.5, 8), bodyMat, isArm ? -0.2 : -0.3, joint.pivot);
            const midJoint = createPart(new THREE.SphereGeometry(isArm ? 0.07 : 0.1, 12, 12), jointMat, isArm ? -0.25 : -0.3, upper.pivot);
            const lower = createPart(new THREE.CylinderGeometry(isArm ? 0.05 : 0.07, isArm ? 0.07 : 0.1, isArm ? 0.35 : 0.5, 8), bodyMat, isArm ? -0.2 : -0.3, midJoint.pivot);
            return { joint, midJoint };
        }

        const armL = makeLimb(chest.pivot, -0.45, 0.3, true);
        const armR = makeLimb(chest.pivot, 0.45, 0.3, true);
        const legL = makeLimb(pelvis.pivot, -0.2, -0.1, false);
        const legR = makeLimb(pelvis.pivot, 0.2, -0.1, false);

        joints = {
            pelvis: pelvis.pivot, spine: spine.pivot, neck: neck.pivot,
            lShldr: armL.joint.pivot, rShldr: armR.joint.pivot,
            lElbow: armL.midJoint.pivot, rElbow: armR.midJoint.pivot,
            lHip: legL.joint.pivot, rHip: legR.joint.pivot,
            lKnee: legL.midJoint.pivot, rKnee: legR.midJoint.pivot
        };
    }

    function applyPose(id) {
        Object.values(joints).forEach(j => j.rotation.set(0,0,0));
        joints.pelvis.position.y = 1.1;
        const phase = id * 0.7;
        
        joints.pelvis.rotation.z = Math.sin(phase) * 0.2;
        joints.spine.rotation.x = Math.cos(phase) * 0.15;
        joints.lHip.rotation.x = Math.sin(phase) * 0.7;
        joints.rHip.rotation.x = -Math.sin(phase) * 0.5;
        joints.lKnee.rotation.x = Math.abs(Math.cos(phase)) * 1.0;
        joints.lShldr.rotation.z = -1.2;
        
        if(id % 5 === 0) { // Seated
            joints.pelvis.position.y = 0.6;
            joints.lHip.rotation.x = -1.4; joints.rHip.rotation.x = -1.4;
            joints.lKnee.rotation.x = 1.2; joints.rKnee.rotation.x = 1.2;
        }
    }

    function createPoseButtons() {
        const container = document.getElementById('poseButtons');
        for(let i=1; i<=40; i++) {
            const btn = document.createElement('button');
            btn.innerText = 'Pose ' + i;
            btn.onclick = () => applyPose(i);
            container.appendChild(btn);
        }
    }

    document.getElementById('lightPos').oninput = (e) => {
        if(spotLight) spotLight.position.x = parseFloat(e.target.value);
    };

    function animate() {
        requestAnimationFrame(animate);
        if(controls) controls.update();
        if(renderer && scene && camera) renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        if (camera && renderer) {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    });

    // Starta kontroll-loopen
    checkLibraries();
</script>
</body>
</html>
