<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kroki Studio - Anatomical Mannequin</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); padding: 20px; border-radius: 12px; max-height: 85vh; overflow-y: auto; width: 240px; z-index: 100; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        button { width: 100%; margin-bottom: 6px; padding: 10px; cursor: pointer; background: #333; color: #eee; border: 1px solid #444; border-radius: 6px; font-weight: bold; transition: all 0.2s; }
        button:hover { background: #ffcc00; color: #000; border-color: #ffcc00; }
        .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin: 15px 0 5px 0; }
        input[type=range] { width: 100%; accent-color: #ffcc00; cursor: pointer; }
        h2 { margin: 0 0 15px 0; color: #ffcc00; font-size: 20px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .controls-hint { font-size: 10px; color: #666; margin-top: 15px; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>

<div id="ui">
    <h2>KROKI STUDIO</h2>
    
    <div class="label">Light Direction</div>
    <input type="range" id="lightPos" min="-12" max="12" step="0.1" value="5">
    
    <div class="label">Poses (40 Variants)</div>
    <div id="poseButtons"></div>

    <div class="controls-hint">
        Left Click: Rotate Camera<br>
        Right Click: Pan<br>
        Scroll: Zoom
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com",
            "three/addons/": "https://unpkg.com"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- SCENE SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x151515);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2.5, 7);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, 0);

    // --- LIGHTING ---
    const spotLight = new THREE.SpotLight(0xffffff, 150); // Stronger light for shadows
    spotLight.position.set(5, 8, 5);
    spotLight.castShadow = true;
    spotLight.angle = Math.PI / 4;
    spotLight.penumbra = 0.3;
    scene.add(spotLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    // Ground Plane for Shadows
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(50, 50),
        new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // --- MATERIALS (As per requested image) ---
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.4, metalness: 0.1 });
    const jointMat = new THREE.MeshStandardMaterial({ color: 0x8800ff, roughness: 0.3 });

    // --- BUILD MANNEQUIN ---
    const mannequin = new THREE.Group();
    scene.add(mannequin);

    function createSegment(geom, mat, yOffset, parent) {
        const mesh = new THREE.Mesh(geom, mat);
        mesh.position.y = yOffset;
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        const pivot = new THREE.Group();
        pivot.add(mesh);
        if (parent) parent.add(pivot);
        return { pivot, mesh };
    }

    // Body Structure
    const pelvis = createSegment(new THREE.CapsuleGeometry(0.22, 0.1, 4, 8), bodyMat, 0, mannequin);
    pelvis.pivot.position.y = 1.2;

    const spine = createSegment(new THREE.SphereGeometry(0.1, 16, 16), jointMat, 0, pelvis.pivot);
    const chest = createSegment(new THREE.CapsuleGeometry(0.28, 0.45, 4, 12), bodyMat, 0.35, spine.pivot);

    const neck = createSegment(new THREE.SphereGeometry(0.08, 12, 12), jointMat, 0.4, chest.pivot);
    const head = createSegment(new THREE.SphereGeometry(0.2, 24, 24), bodyMat, 0.22, neck.pivot);
    head.mesh.scale.set(1, 1.25, 1);

    // Arms
    function buildArm(side) {
        const shoulder = createSegment(new THREE.SphereGeometry(0.12, 16, 16), jointMat, 0, chest.pivot);
        shoulder.pivot.position.set(side * 0.45, 0.3, 0);
        const upper = createSegment(new THREE.CapsuleGeometry(0.09, 0.35, 4, 8), bodyMat, -0.25, shoulder.pivot);
        const elbow = createSegment(new THREE.SphereGeometry(0.08, 12, 12), jointMat, -0.25, upper.pivot);
        const lower = createSegment(new THREE.CapsuleGeometry(0.08, 0.3, 4, 8), bodyMat, -0.25, elbow.pivot);
        return { shoulder, elbow };
    }
    const armL = buildArm(-1); const armR = buildArm(1);

    // Legs
    function buildLeg(side) {
        const hip = createSegment(new THREE.SphereGeometry(0.13, 16, 16), jointMat, 0, pelvis.pivot);
        hip.pivot.position.set(side * 0.2, -0.1, 0);
        const thigh = createSegment(new THREE.CapsuleGeometry(0.12, 0.45, 4, 8), bodyMat, -0.3, hip.pivot);
        const knee = createSegment(new THREE.SphereGeometry(0.1, 12, 12), jointMat, -0.3, thigh.pivot);
        const shin = createSegment(new THREE.CapsuleGeometry(0.1, 0.45, 4, 8), bodyMat, -0.3, knee.pivot);
        return { hip, knee };
    }
    const legL = buildLeg(-1); const legR = buildLeg(1);

    // --- POSING LOGIC ---
    const joints = {
        pelvis: pelvis.pivot, spine: spine.pivot, neck: neck.pivot,
        lShldr: armL.shoulder.pivot, rShldr: armR.shoulder.pivot,
        lElbow: armL.elbow.pivot, rElbow: armR.elbow.pivot,
        lHip: legL.hip.pivot, rHip: legR.hip.pivot,
        lKnee: legL.knee.pivot, rKnee: legR.knee.pivot
    };

    function applyPose(index) {
        // Reset all rotations
        Object.values(joints).forEach(j => j.rotation.set(0,0,0));
        joints.pelvis.position.y = 1.2;

        const s = Math.sin(index * 1.5);
        const c = Math.cos(index * 2.1);

        // Procedural posing for variety
        joints.pelvis.rotation.x = s * 0.2;
        joints.pelvis.rotation.z = c * 0.4; // Contrapposto
        joints.spine.rotation.y = s * 0.6;
        joints.spine.rotation.x = -Math.abs(c * 0.3);
        
        joints.lHip.rotation.x = s * 1.2;
        joints.rHip.rotation.x = -s * 0.5;
        joints.lKnee.rotation.x = Math.abs(c * 1.5);
        joints.rKnee.rotation.x = Math.abs(s * 0.8);
        
        joints.lShldr.rotation.z = -1 - s;
        joints.rShldr.rotation.x = 1.5 * c;
        joints.lElbow.rotation.x = -1.2;

        // If sitting pose
        if (index % 5 === 0) {
            joints.lHip.rotation.x = -1.5;
            joints.rHip.rotation.x = -1.4;
            joints.lKnee.rotation.x = 1.5;
            joints.rKnee.rotation.x = 1.2;
            joints.pelvis.position.y = 0.6;
        }
    }

    // UI Buttons
    const btnBox = document.getElementById('poseButtons');
    for(let i=1; i<=40; i++) {
        const b = document.createElement('button');
        b.innerHTML = `POSE ${i}`;
        b.onclick = () => applyPose(i);
        btnBox.appendChild(b);
    }

    document.getElementById('lightPos').oninput = (e) => {
        spotLight.position.x = parseFloat(e.target.value);
    };

    // --- LOOP ---
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
